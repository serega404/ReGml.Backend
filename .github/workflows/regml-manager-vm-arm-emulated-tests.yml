---
name: ReGml Manager ARM VM Tests (Emulated)

"on":
  workflow_dispatch:
    inputs:
      install_version:
        description: Docker image tag to install
        required: true
        default: v2025.3.1
        type: string
      update_version:
        description: Docker image tag to update to
        required: true
        default: v2025.3.2
        type: string

permissions:
  contents: read

concurrency:
  group: regml-manager-vm-arm-emulated-tests-${{ github.ref }}
  cancel-in-progress: false

jobs:
  install-update-delete-arm-emulated:
    name: ${{ matrix.distro }} / ${{ matrix.arch }} / TCG
    runs-on: ubuntu-26.04
    timeout-minutes: 240

    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: debian-13
            arch: arm64
            cache_key: debian-13-arm64
          - distro: alpine-3.23
            arch: aarch64
            cache_key: alpine-3.23-aarch64

    env:
      INSTALL_VERSION: ${{ inputs.install_version }}
      UPDATE_VERSION: ${{ inputs.update_version }}
      VM_IMAGE_CACHE: /tmp/regml-manager-vm-image-cache
      DIAGNOSTICS_DIR: >-
        /tmp/regml-manager-vm-arm-emulated-diagnostics-${{ github.run_id }}-${{
        github.run_attempt }}-${{ matrix.distro }}-${{ matrix.arch }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache VM image
        uses: actions/cache@v4
        with:
          path: ${{ env.VM_IMAGE_CACHE }}
          key: regml-manager-vm-image-${{ matrix.cache_key }}-latest-v3

      - name: Run ReGml Manager ARM VM scenario with QEMU TCG
        env:
          VM_DISTRO: ${{ matrix.distro }}
          VM_ARCH: ${{ matrix.arch }}
          QEMU_ALLOW_TCG: "true"
          QEMU_MEMORY_MB: "4096"
          QEMU_SMP: "2"
          SSH_WAIT_ATTEMPTS: "240"
        run: |
          set -eux
          sh tests/regml-manager/run-qemu-vm.sh

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: >-
            regml-manager-vm-arm-emulated-diagnostics-${{ matrix.distro }}-${{
            matrix.arch }}
          path: ${{ env.DIAGNOSTICS_DIR }}
          if-no-files-found: ignore
